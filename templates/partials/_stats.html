{# ?? _stats.html ?? Stat summary cards (total / trusted / untrusted) #}
<div class="stats-grid stagger-1 fade-in">
  <!-- Total -->
  <div class="card px-5 py-4">
    <div class="flex items-center justify-between mb-4">
      <span class="text-slate-400 dark:text-slate-500 font-medium uppercase tracking-widest" style="font-size:11px" data-i18n="statTotal">Total</span>
      <div class="flex items-center justify-center" style="width:30px;height:30px;border-radius:9px;background:rgba(8,145,178,.08)">
        <i data-lucide="laptop" class="w-3.5 h-3.5" style="color:#0891B2"></i>
      </div>
    </div>
    <p id="stat-total" class="tabular-nums font-semibold text-slate-900 dark:text-white leading-none mb-1.5" style="font-size:34px;letter-spacing:-.02em">0</p>
    <p class="text-slate-400 dark:text-slate-500" style="font-size:12px" data-i18n="statTotalDesc">Dispositivos en red</p>
  </div>

  <!-- Trusted -->
  <div class="card px-5 py-4">
    <div class="flex items-center justify-between mb-4">
      <span class="font-medium uppercase tracking-widest" style="font-size:11px;color:#059669" data-i18n="statTrusted">Confiables</span>
      <div class="flex items-center justify-center" style="width:30px;height:30px;border-radius:9px;background:rgba(5,150,105,.08)">
        <i data-lucide="shield-check" class="w-3.5 h-3.5" style="color:#059669"></i>
      </div>
    </div>
    <p id="stat-trusted" class="tabular-nums font-semibold leading-none mb-1.5" style="font-size:34px;letter-spacing:-.02em;color:#059669">0</p>
    <p class="text-slate-400 dark:text-slate-500" style="font-size:12px" data-i18n="statTrustedDesc">Verificados por ti</p>
  </div>

  <!-- Untrusted -->
  <div class="card px-5 py-4">
    <div class="flex items-center justify-between mb-4">
      <span class="font-medium uppercase tracking-widest" style="font-size:11px;color:#e11d48" data-i18n="statUntrusted">Sin verificar</span>
      <div class="flex items-center justify-center" style="width:30px;height:30px;border-radius:9px;background:rgba(225,29,72,.08)">
        <i data-lucide="shield-alert" class="w-3.5 h-3.5" style="color:#e11d48"></i>
      </div>
    </div>
    <p id="stat-untrusted" class="tabular-nums font-semibold leading-none mb-1.5" style="font-size:34px;letter-spacing:-.02em;color:#e11d48">0</p>
    <p class="text-slate-400 dark:text-slate-500" style="font-size:12px" data-i18n="statUntrustedDesc">Requieren revisión</p>
  </div>
</div>
