{# ── _modal_config.html ── System configuration modal #}
<div id="modal-config" class="fixed inset-0 modal-overlay flex items-end sm:items-center justify-center z-[65] hidden">
  <div class="card w-full sm:max-w-md relative fade-in max-h-[90vh] overflow-y-auto custom-scrollbar rounded-b-none sm:rounded-xl" style="position:relative;overflow-y:auto">
    <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#FF8A00,#FF5E7E)"></div>

    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100 dark:border-slate-800/40">
      <div class="flex items-center gap-2">
        <i data-lucide="settings" class="w-4 h-4 text-slate-400"></i>
        <span class="font-semibold text-slate-900 dark:text-white text-sm" data-i18n="cfgTitle">Configuración del sistema</span>
      </div>
      <button onclick="cerrarConfig()"
        class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-dark3 transition">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>

    <!-- Sections -->
    <div class="divide-y divide-slate-100 dark:divide-slate-800/40">

      <!-- Telegram -->
      <div class="px-5 py-4">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="send" class="w-3.5 h-3.5 text-slate-400"></i>
          <span class="text-xs font-semibold text-slate-700 dark:text-slate-300" data-i18n="cfgTelegram">Notificaciones Telegram</span>
        </div>
        <div class="space-y-2.5">
          <div>
            <label class="text-xs text-slate-400 dark:text-slate-500 mb-1 block" data-i18n="cfgToken">Bot Token</label>
            <input id="cfg-token" type="password" placeholder="123456:ABC-DEF..." class="input-base font-mono" autocomplete="off" />
          </div>
          <div>
            <label class="text-xs text-slate-400 dark:text-slate-500 mb-1 block" data-i18n="cfgChatId">Chat ID</label>
            <input id="cfg-chat" type="text" placeholder="-100123456789" class="input-base font-mono" autocomplete="off" />
          </div>
          <button onclick="testTelegram()" class="btn-action btn-neutral">
            <i data-lucide="send" class="w-3 h-3"></i>
            <span data-i18n="cfgTestBtn">Probar conexión</span>
          </button>
        </div>
      </div>

      <!-- Monitoreo -->
      <div class="px-5 py-4">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="timer" class="w-3.5 h-3.5 text-slate-400"></i>
          <span class="text-xs font-semibold text-slate-700 dark:text-slate-300" data-i18n="cfgMonitoring">Monitoreo de red</span>
        </div>
        <label class="text-xs text-slate-400 dark:text-slate-500 mb-2 block">
          <span data-i18n="cfgInterval">Intervalo de escaneo</span>
          <span class="ml-1" data-i18n="cfgIntervalMin">(mín. 30s)</span>
        </label>
        <div class="flex items-center gap-2 mb-2.5">
          <input id="cfg-intervalo" type="number" min="30" max="3600" value="120"
            class="input-base" style="width:80px" inputmode="numeric" />
          <span class="text-xs text-slate-400" data-i18n="cfgIntervalUnit">seg</span>
        </div>
        <div class="flex gap-1.5 flex-wrap">
          <button onclick="setIntervalo(30)"  class="btn-action btn-neutral">30s</button>
          <button onclick="setIntervalo(60)"  class="btn-action btn-neutral">1 min</button>
          <button onclick="setIntervalo(120)" class="btn-action btn-neutral">2 min</button>
          <button onclick="setIntervalo(300)" class="btn-action btn-neutral">5 min</button>
          <button onclick="setIntervalo(600)" class="btn-action btn-neutral">10 min</button>
        </div>
      </div>

      <!-- Sesión -->
      <div class="px-5 py-4">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="shield" class="w-3.5 h-3.5 text-slate-400"></i>
          <span class="text-xs font-semibold text-slate-700 dark:text-slate-300" data-i18n="cfgSession">Tiempo de sesión</span>
        </div>
        <div class="flex items-center gap-2 mb-2.5">
          <input id="cfg-session" type="number" min="0.083" max="24" step="0.5" value="8"
            class="input-base" style="width:80px" inputmode="decimal" />
          <span class="text-xs text-slate-400" data-i18n="cfgSessionUnit">horas</span>
        </div>
        <div class="flex gap-1.5 flex-wrap mb-3">
          <button onclick="document.getElementById('cfg-session').value=0.5" class="btn-action btn-neutral">30 min</button>
          <button onclick="document.getElementById('cfg-session').value=1"   class="btn-action btn-neutral">1h</button>
          <button onclick="document.getElementById('cfg-session').value=4"   class="btn-action btn-neutral">4h</button>
          <button onclick="document.getElementById('cfg-session').value=8"   class="btn-action btn-neutral">8h</button>
        </div>
        <p class="text-slate-400 dark:text-slate-500" style="font-size:11px" data-i18n="cfgSessionDesc">
          La sesión se cierra automáticamente tras el tiempo configurado de inactividad.
        </p>
      </div>

    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-2 px-5 py-4 border-t border-slate-100 dark:border-slate-800/40">
      <button onclick="cerrarConfig()"
        class="px-4 py-2 text-xs font-medium border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-dark3 transition text-slate-600 dark:text-slate-400"
        data-i18n="cfgCancel">Cancelar</button>
      <button onclick="guardarConfig()"
        class="px-4 py-2 text-xs font-semibold text-white rounded-lg hover:opacity-90 transition"
        style="background:linear-gradient(135deg,#FF8A00,#FF5E7E)" data-i18n="cfgSave">Guardar cambios</button>
    </div>

  </div>
</div>
