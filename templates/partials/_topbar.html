{# 🌊 _topbar.html 🌊 Sticky top bar with search / filter controls #}
<div class="sticky top-0 z-30 border-b border-slate-200/80 dark:border-slate-800/60 bg-slate-50/90 dark:bg-dark1/90 backdrop-blur-sm px-4 py-3">
  <!-- Mobile: title row -->
  <div class="flex items-center justify-between mb-2 sm:hidden">
    <div class="flex items-center gap-2 pl-8">
      <span class="font-semibold text-slate-900 dark:text-white text-sm">LANGuard</span>
    </div>
    <button onclick="toggleDarkMode()" class="p-1.5 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-dark3 transition">
      <i id="icono-luna-m" data-lucide="moon" class="w-4 h-4"></i>
      <i id="icono-sol-m"  data-lucide="sun"  class="w-4 h-4 hidden"></i>
    </button>
  </div>
  <!-- Filters -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
    <input id="filtro-nombre" type="text" data-i18n="filterName"
      placeholder="Filtrar por nombre" class="input-base" />
    <input id="filtro-mac" type="text" data-i18n="filterMac"
      placeholder="Filtrar por MAC" class="input-base" />
    <div class="relative">
      <button id="trustBtn" class="input-base flex items-center justify-between cursor-pointer text-left">
        <div class="flex items-center gap-2">
          <span id="trust-dot" class="inline-block w-2 h-2 rounded-full bg-slate-400 flex-shrink-0"></span>
          <span id="trustLabel" data-i18n="filterAll">Todos</span>
        </div>
        <i data-lucide="chevrons-up-down" class="w-3.5 h-3.5 text-slate-400 flex-shrink-0"></i>
      </button>
      <div id="trustMenu" class="dropdown-menu hidden">
        <button onclick="setTrustFilter('all')"       class="dropdown-item"><span class="w-2 h-2 rounded-full bg-slate-400 flex-shrink-0"></span><span data-i18n="filterAll">Todos</span></button>
        <button onclick="setTrustFilter('trusted')"   class="dropdown-item"><span class="w-2 h-2 rounded-full bg-emerald-500 flex-shrink-0"></span><span data-i18n="filterTrusted">Confiables</span></button>
        <button onclick="setTrustFilter('untrusted')" class="dropdown-item"><span class="w-2 h-2 rounded-full bg-rose-500 flex-shrink-0"></span><span data-i18n="filterUntrusted">No confiables</span></button>
      </div>
    </div>
  </div>
</div>
