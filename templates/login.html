<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Lince</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.svg') }}">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            dark1: "#0c0c0f", dark2: "#111118", dark3: "#1a1a24",
            brand: {
              50:  "#FFF4E5",
              100: "#FFE0B8",
              400: "#FF8A00",
              500: "#FF5E7E",
              600: "#7C3AED",
              700: "#3B82F6"
            }
          },
          fontFamily: { sans: ["Geist","sans-serif"], mono: ["Geist Mono","monospace"] }
        }
      }
    };
    if (localStorage.getItem("modoOscuro") === "true") {
      document.documentElement.classList.add("dark");
    }
  </script>
  <style>
    @keyframes fade-up {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-up { animation: fade-up .35s cubic-bezier(.16,1,.3,1) both; }

    /* ── Background shapes ── */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    /* Light mode shapes */
    .shape-tl {
      width: 320px; height: 320px;
      top: -120px; left: -100px;
      background: #f1f5f9;
      border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
    }
    .shape-br {
      width: 280px; height: 280px;
      bottom: -100px; right: -80px;
      background: #f1f5f9;
      border-radius: 40% 60% 30% 70% / 60% 40% 50% 50%;
    }
    .shape-tr {
      width: 140px; height: 140px;
      top: 40px; right: -40px;
      background: #e2e8f0;
      border-radius: 50% 30% 60% 40%;
    }
    .shape-bl {
      width: 100px; height: 100px;
      bottom: 60px; left: -30px;
      background: #e2e8f0;
      border-radius: 30% 60% 40% 50%;
    }
    /* Dark mode shapes */
    .dark .shape-tl { background: #1a1a24; }
    .dark .shape-br { background: #1a1a24; }
    .dark .shape-tr { background: #111118; }
    .dark .shape-bl { background: #111118; }

    /* ── Inputs ── */
    .field {
      width:100%; padding:9px 10px 9px 34px; border-radius:8px; font-size:13px;
      border:1px solid #e2e8f0; background:#fff; outline:none; box-sizing:border-box;
      transition:border-color .15s, box-shadow .15s; font-family:"Geist",sans-serif; color:#0f172a;
    }
    .field:focus { border-color:#FF8A00; box-shadow:0 0 0 3px rgba(255,138,0,.10); }
    .field::placeholder { color:#94a3b8; }
    .dark .field { background:#1a1a24; border-color:#2a2d40; color:#e2e8f0; }
    .dark .field:focus { border-color:#FF8A00; box-shadow:0 0 0 3px rgba(255,138,0,.15); }

    .field-icon {
      position:absolute; left:10px; top:50%; transform:translateY(-50%);
      width:14px; height:14px; color:#94a3b8; pointer-events:none;
    }

    .btn-main {
      width:100%; padding:9px 16px; border-radius:8px; font-size:13px; font-weight:500;
      background: linear-gradient(135deg, #FF8A00, #FF5E7E);
      color:#fff; border:none; cursor:pointer;
      font-family:"Geist",sans-serif; transition:opacity .15s, transform .1s;
    }
    .btn-main:hover  { opacity:.92; }
    .btn-main:active { transform:scale(.99); }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-dark1 font-sans antialiased px-4 relative overflow-hidden" style="font-size:13px">

  <!-- Background shapes -->
  <div class="bg-shape shape-tl"></div>
  <div class="bg-shape shape-tr"></div>
  <div class="bg-shape shape-br"></div>
  <div class="bg-shape shape-bl"></div>

  <!-- Content -->
  <div class="w-full max-w-[340px] fade-up relative z-10">

    <!-- Wordmark -->
    <div class="mb-8 flex flex-col items-center text-center">
      <img src="{{ url_for('static', filename='favicon.svg') }}" alt="Lince" class="w-14 h-14 mb-3">
      <h1 class="font-semibold text-slate-900 dark:text-white leading-none" style="font-size:22px;letter-spacing:-.02em">Lince</h1>
      <p class="text-slate-400 dark:text-slate-500 mt-1.5" style="font-size:12px" data-i18n="loginSubtitle">Inicia sesión para continuar</p>
    </div>

    <!-- Alerts -->
    {% if error %}
    <div class="mb-4 flex items-start gap-2 px-3 py-2.5 rounded-lg text-red-700 dark:text-red-400 fade-up"
      style="font-size:12px;background:#fff1f2;border:1px solid #fecaca">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 mt-px flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span data-i18n="loginErrorCredentials">Usuario o contraseña incorrectos</span>
    </div>
    {% endif %}

    {% if timeout %}
    <div class="mb-4 flex items-start gap-2 px-3 py-2.5 rounded-lg text-amber-700 dark:text-amber-400 fade-up"
      style="font-size:12px;background:#fffbeb;border:1px solid #fde68a">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 mt-px flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span data-i18n="sessionExpiredMsg">Sesión expirada. Vuelve a iniciar sesión.</span>
    </div>
    {% endif %}

    <!-- Card -->
    <div class="bg-white dark:bg-dark2 rounded-xl border border-slate-200 dark:border-slate-800/60 p-6">
      <form method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- Usuario -->
        <div>
          <label class="block text-slate-500 dark:text-slate-400 mb-1.5 font-medium" style="font-size:12px" data-i18n="loginUser">Usuario</label>
          <div class="relative">
            <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" name="usuario" data-i18n="loginPlaceholderEmail" placeholder="correo@ejemplo.com" required autofocus
              autocomplete="username" class="field" />
          </div>
        </div>

        <!-- Contraseña -->
        <div>
          <label class="block text-slate-500 dark:text-slate-400 mb-1.5 font-medium" style="font-size:12px" data-i18n="loginPassword">Contraseña</label>
          <div class="relative">
            <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="pass" type="password" name="contrasena" placeholder="••••••••" required
              style="padding-right:36px" autocomplete="current-password" class="field" />
            <button type="button" onclick="togglePass()" aria-label="Mostrar contraseña"
              class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition p-1">
              <svg id="ico-eye"     xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="ico-eye-off" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-main" data-i18n="loginButton">Ingresar</button>
      </form>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-between mt-5 px-0.5">
      <button onclick="toggleTheme()"
        class="flex items-center gap-1.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition" style="font-size:11px">
        <svg id="th-moon" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="th-sun"  xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span id="th-label" data-i18n="changeTheme">Modo oscuro</span>
      </button>
      <a href="https://github.com/Osvaldo-Net/Lince" target="_blank" rel="noopener noreferrer"
        class="flex items-center gap-1.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition" style="font-size:11px">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        GitHub
      </a>
    </div>

  </div>

  <!-- i18n debe cargarse antes de togglePass/toggleTheme para que t() ya exista -->
  <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
  <script>
    function togglePass() {
      const p = document.getElementById('pass');
      const show = p.type === 'password';
      p.type = show ? 'text' : 'password';
      document.getElementById('ico-eye').classList.toggle('hidden', show);
      document.getElementById('ico-eye-off').classList.toggle('hidden', !show);
    }
    function toggleTheme() {
      const dark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('modoOscuro', dark);
      syncThemeIcon();
    }
    function syncThemeIcon() {
      const dark = document.documentElement.classList.contains('dark');
      document.getElementById('th-moon').classList.toggle('hidden', dark);
      document.getElementById('th-sun').classList.toggle('hidden', !dark);
      const label = document.getElementById('th-label');
      const key   = dark ? 'themeLight' : 'changeTheme';
      label.setAttribute('data-i18n', key);
      // Texto en español inmediato (sin esperar a que cargue i18n.js,
      // que es asíncrono). Se corrige solo al idioma real vía el evento
      // "langchange" que dispara i18n.js apenas termina de cargar.
      label.textContent = dark ? 'Modo claro' : 'Modo oscuro';
    }
    syncThemeIcon();
    // FIX i18n: una vez i18n.js termina de cargar el idioma guardado,
    // re-traduce el label del tema (y cualquier otra cosa futura que
    // dependa de "langchange") sin depender del orden de carga de scripts.
    document.addEventListener('langchange', () => {
      const label = document.getElementById('th-label');
      const key   = label?.getAttribute('data-i18n');
      if (key && window.t) label.textContent = t(key);
    });
  </script>
</body>
</html>
