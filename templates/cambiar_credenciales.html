<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Lince</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: { dark1: "#0c0c0f", dark2: "#111118", dark3: "#1a1a24" },
          fontFamily: { sans: ["Geist","sans-serif"], mono: ["Geist Mono","monospace"] }
        }
      }
    };
    if (localStorage.getItem("modoOscuro") === "true") {
      document.documentElement.classList.add("dark");
    }
  </script>
  <style>
    @keyframes fade-up {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-up { animation: fade-up .35s cubic-bezier(.16,1,.3,1) both; }

    /* ── Background shapes ── */
    .bg-shape { position:fixed; pointer-events:none; z-index:0; }
    .shape-tl {
      width:320px; height:320px; top:-120px; left:-100px;
      background:#f1f5f9;
      border-radius:60% 40% 70% 30% / 50% 60% 40% 50%;
    }
    .shape-br {
      width:280px; height:280px; bottom:-100px; right:-80px;
      background:#f1f5f9;
      border-radius:40% 60% 30% 70% / 60% 40% 50% 50%;
    }
    .shape-tr {
      width:140px; height:140px; top:40px; right:-40px;
      background:#e2e8f0;
      border-radius:50% 30% 60% 40%;
    }
    .shape-bl {
      width:100px; height:100px; bottom:60px; left:-30px;
      background:#e2e8f0;
      border-radius:30% 60% 40% 50%;
    }
    .dark .shape-tl { background:#1a1a24; }
    .dark .shape-br { background:#1a1a24; }
    .dark .shape-tr { background:#111118; }
    .dark .shape-bl { background:#111118; }

    /* ── Inputs ── */
    .field {
      width:100%; padding:9px 10px 9px 34px; border-radius:8px; font-size:13px;
      border:1px solid #e2e8f0; background:#fff; outline:none; box-sizing:border-box;
      transition:border-color .15s, box-shadow .15s; font-family:"Geist",sans-serif; color:#0f172a;
    }
    .field:focus { border-color:#334155; box-shadow:0 0 0 3px rgba(51,65,85,.08); }
    .field::placeholder { color:#94a3b8; }
    .dark .field { background:#1a1a24; border-color:#2a2d40; color:#e2e8f0; }
    .dark .field:focus { border-color:#475569; box-shadow:0 0 0 3px rgba(71,85,105,.12); }

    .field-icon {
      position:absolute; left:10px; top:50%; transform:translateY(-50%);
      width:14px; height:14px; color:#94a3b8; pointer-events:none;
    }

    .btn-main {
      width:100%; padding:9px 16px; border-radius:8px; font-size:13px; font-weight:500;
      background:#0f172a; color:#f8fafc; border:none; cursor:pointer;
      font-family:"Geist",sans-serif; transition:background .15s, transform .1s;
    }
    .btn-main:hover  { background:#1e293b; }
    .btn-main:active { transform:scale(.99); }
    .dark .btn-main       { background:#f1f5f9; color:#0f172a; }
    .dark .btn-main:hover { background:#e2e8f0; }

    .req-item { transition:color .2s; display:flex; align-items:center; gap:6px; font-size:11px; }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-dark1 font-sans antialiased px-4 relative overflow-hidden" style="font-size:13px">

  <!-- Background shapes -->
  <div class="bg-shape shape-tl"></div>
  <div class="bg-shape shape-tr"></div>
  <div class="bg-shape shape-br"></div>
  <div class="bg-shape shape-bl"></div>

  <!-- Content -->
  <div class="w-full max-w-[340px] fade-up relative z-10">

    <!-- Wordmark -->
    <div class="mb-8">
      <h1 class="font-semibold text-slate-900 dark:text-white leading-none" style="font-size:22px;letter-spacing:-.02em">Lince</h1>
      <p class="text-slate-400 dark:text-slate-500 mt-1.5" style="font-size:12px">Actualiza tus credenciales de acceso</p>
    </div>

    {% if error %}
    <div class="mb-4 flex items-start gap-2 px-3 py-2.5 rounded-lg text-red-700 dark:text-red-400 fade-up"
      style="font-size:12px;background:#fff1f2;border:1px solid #fecaca">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 mt-px flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Card -->
    <div class="bg-white dark:bg-dark2 rounded-xl border border-slate-200 dark:border-slate-800/60 p-6">
      <form method="POST" action="{{ url_for('cambiar_credenciales') }}" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- Correo -->
        <div>
          <label class="block text-slate-500 dark:text-slate-400 mb-1.5 font-medium" style="font-size:12px">Nuevo correo</label>
          <div class="relative">
            <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input id="nuevo_usuario" type="email" name="nuevo_usuario"
              placeholder="correo@ejemplo.com" required autofocus
              autocomplete="email" class="field" />
          </div>
        </div>

        <!-- Nueva contraseña -->
        <div>
          <label class="block text-slate-500 dark:text-slate-400 mb-1.5 font-medium" style="font-size:12px">Nueva contraseña</label>
          <div class="relative">
            <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="nueva" type="password" name="nueva_contrasena" placeholder="••••••••"
              required style="padding-right:36px" autocomplete="new-password" class="field" />
            <button type="button" onclick="toggleVer('nueva','eye-n','eye-off-n')"
              class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition p-1">
              <svg id="eye-n"     xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-off-n" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <!-- Requisitos -->
        <div id="req-box" class="hidden rounded-lg border border-slate-200 dark:border-slate-800/60 bg-slate-50 dark:bg-dark3/60 px-3 py-3 grid grid-cols-2 gap-x-4 gap-y-1.5">
          <span data-req="length" class="req-item text-slate-400">
            <svg class="req-icon w-3 h-3 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/></svg>
            <span>8 caracteres</span>
          </span>
          <span data-req="upper" class="req-item text-slate-400">
            <svg class="req-icon w-3 h-3 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/></svg>
            <span>Mayúscula</span>
          </span>
          <span data-req="lower" class="req-item text-slate-400">
            <svg class="req-icon w-3 h-3 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/></svg>
            <span>Minúscula</span>
          </span>
          <span data-req="digit" class="req-item text-slate-400">
            <svg class="req-icon w-3 h-3 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/></svg>
            <span>Número</span>
          </span>
          <span data-req="symbol" class="req-item text-slate-400 col-span-2">
            <svg class="req-icon w-3 h-3 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/></svg>
            <span>Símbolo especial (!@#…)</span>
          </span>
        </div>

        <!-- Confirmar -->
        <div id="confirm-wrap" class="hidden">
          <label class="block text-slate-500 dark:text-slate-400 mb-1.5 font-medium" style="font-size:12px">Confirmar contraseña</label>
          <div class="relative">
            <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="confirmar" type="password" name="confirmar_contrasena" placeholder="••••••••"
              style="padding-right:36px" autocomplete="new-password" class="field" />
            <button type="button" onclick="toggleVer('confirmar','eye-c','eye-off-c')"
              class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition p-1">
              <svg id="eye-c"     xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-off-c" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <p id="match-msg" class="mt-1.5 hidden" style="font-size:11px"></p>
        </div>

        <button type="submit" class="btn-main">Guardar cambios</button>
      </form>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-between mt-5 px-0.5">
      <button onclick="toggleTheme()"
        class="flex items-center gap-1.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition" style="font-size:11px">
        <svg id="th-moon" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="th-sun"  xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span id="th-label">Modo oscuro</span>
      </button>
      <a href="https://github.com/Osvaldo-Net/Lince" target="_blank" rel="noopener noreferrer"
        class="flex items-center gap-1.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition" style="font-size:11px">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        GitHub
      </a>
    </div>

  </div>

  <script>
    function toggleVer(inputId, eyeId, eyeOffId) {
      const inp  = document.getElementById(inputId);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      document.getElementById(eyeId).classList.toggle('hidden', show);
      document.getElementById(eyeOffId).classList.toggle('hidden', !show);
    }

    const rules = {
      length: v => v.length >= 8,
      upper:  v => /[A-Z]/.test(v),
      lower:  v => /[a-z]/.test(v),
      digit:  v => /\d/.test(v),
      symbol: v => /[^A-Za-z0-9]/.test(v),
    };

    function makeIcon(type) {
      const ns  = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(ns, "svg");
      svg.setAttribute("class", "req-icon w-3 h-3 flex-shrink-0");
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("fill", "none");
      svg.setAttribute("stroke", "currentColor");
      svg.setAttribute("stroke-width", "2.5");
      if (type === "ok") {
        svg.style.color = "#22c55e";
        const p = document.createElementNS(ns, "polyline");
        p.setAttribute("points", "20 6 9 17 4 12");
        svg.appendChild(p);
      } else if (type === "fail") {
        svg.style.color = "#f87171";
        const l1 = document.createElementNS(ns, "line");
        l1.setAttribute("x1","18"); l1.setAttribute("y1","6");
        l1.setAttribute("x2","6");  l1.setAttribute("y2","18");
        const l2 = document.createElementNS(ns, "line");
        l2.setAttribute("x1","6");  l2.setAttribute("y1","6");
        l2.setAttribute("x2","18"); l2.setAttribute("y2","18");
        svg.appendChild(l1); svg.appendChild(l2);
      } else {
        const c = document.createElementNS(ns, "circle");
        c.setAttribute("cx","12"); c.setAttribute("cy","12"); c.setAttribute("r","9");
        svg.appendChild(c);
      }
      return svg;
    }

    function setReqIcon(el, type) {
      const old = el.querySelector(".req-icon");
      const ico = makeIcon(type);
      if (old) el.replaceChild(ico, old); else el.insertBefore(ico, el.firstChild);
    }

    const passInput   = document.getElementById('nueva');
    const confInput   = document.getElementById('confirmar');
    const reqBox      = document.getElementById('req-box');
    const confirmWrap = document.getElementById('confirm-wrap');
    const matchMsg    = document.getElementById('match-msg');

    passInput.addEventListener('input', () => {
      const v = passInput.value;
      if (v.length > 0) {
        reqBox.classList.remove('hidden');
        confirmWrap.classList.remove('hidden');
      } else {
        reqBox.classList.add('hidden');
        confirmWrap.classList.add('hidden');
        confInput.value = '';
        matchMsg.classList.add('hidden');
      }
      Object.entries(rules).forEach(([id, fn]) => {
        const el = document.querySelector(`[data-req="${id}"]`);
        if (!el) return;
        if (v.length === 0) { setReqIcon(el, "idle"); el.style.color = ''; }
        else if (fn(v))     { setReqIcon(el, "ok");   el.style.color = '#16a34a'; }
        else                { setReqIcon(el, "fail");  el.style.color = '#dc2626'; }
      });
      if (confInput.value.length > 0) checkMatch();
    });

    confInput.addEventListener('input', checkMatch);

    function checkMatch() {
      const ok = confInput.value === passInput.value && confInput.value.length > 0;
      confInput.style.borderColor = ok ? '#86efac' : (confInput.value.length > 0 ? '#fca5a5' : '');
      if (confInput.value.length === 0) { matchMsg.classList.add('hidden'); return; }
      matchMsg.classList.remove('hidden');
      matchMsg.textContent = ok ? '✓ Las contraseñas coinciden' : '✗ Las contraseñas no coinciden';
      matchMsg.style.color = ok ? '#16a34a' : '#dc2626';
    }

    function toggleTheme() {
      const dark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('modoOscuro', dark);
      syncThemeIcon();
    }
    function syncThemeIcon() {
      const dark = document.documentElement.classList.contains('dark');
      document.getElementById('th-moon').classList.toggle('hidden', dark);
      document.getElementById('th-sun').classList.toggle('hidden', !dark);
      document.getElementById('th-label').textContent = dark ? 'Modo claro' : 'Modo oscuro';
    }
    syncThemeIcon();
  </script>
</body>
</html>
